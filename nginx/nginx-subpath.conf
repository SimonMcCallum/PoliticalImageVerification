events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    upstream api {
        server pivs-server:8000;
    }

    upstream client {
        server pivs-client:3000;
    }

    # Rate limiting zone for verification endpoint
    limit_req_zone $binary_remote_addr zone=verify:10m rate=30r/m;
    limit_req_zone $binary_remote_addr zone=submit:10m rate=10r/m;

    server {
        listen 80;
        server_name _;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self' data:; font-src 'self' data:;" always;

        # Max upload size (50MB for image uploads)
        client_max_body_size 50M;

        # === Request flow ===
        # NPM strips the /verify prefix (rewrite ^/verify(/.*)$ $1 break)
        # so requests arrive here WITHOUT /verify:
        #   /ec, /party, /_next/static/... , /api/v1/..., /health
        # The /api and /health locations handle API calls directly.
        # The fallback location / adds /verify back for Next.js (basePath: "/verify").

        # Rate-limited verification endpoint
        location /api/v1/verify/ {
            limit_req zone=verify burst=10 nodelay;
            proxy_pass http://api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Rate-limited submission endpoint
        location /api/v1/assets {
            limit_req zone=submit burst=5 nodelay;
            proxy_pass http://api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # API routes
        location /api/ {
            proxy_pass http://api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Public download links (token-based, no auth)
        location /download/ {
            proxy_pass http://api/api/v1/download/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # API docs
        location /docs {
            proxy_pass http://api;
            proxy_set_header Host $host;
        }

        location /openapi.json {
            proxy_pass http://api;
            proxy_set_header Host $host;
        }

        # Health check
        location /health {
            proxy_pass http://api;
        }

        # Exact match: /verify arrives unstripped when NPM rewrite misses
        # (NPM regex ^/verify(/.*)$ requires a / after /verify)
        # Pass directly to client — Next.js handles /verify as its basePath root
        location = /verify {
            proxy_pass http://client;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Everything else goes to the Next.js client.
        # NPM strips /verify, so /ec arrives as /ec, /_next/static/... as /_next/static/...
        # Next.js expects the /verify prefix (basePath), so we add it back.
        location / {
            rewrite ^(.*)$ /verify$1 break;
            proxy_pass http://client;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
